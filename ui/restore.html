<!doctype html>
<html lang="en" class="restore-document">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restore Sound</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="restore-body">
    <main class="restore-window">
      <button type="button" class="restore-pill" id="restore-sound">
        <img class="restore-icon" src="./muteback-icon.png" alt="" aria-hidden="true" />
        <span>
          <small>Sound Lowered</small>
          <strong class="restore-label" id="restore-label">Restore Sound</strong>
        </span>
        <span class="restore-stop" aria-hidden="true"></span>
      </button>
    </main>

    <script type="module" src="./restore.js"></script>
  </body>
</html>
