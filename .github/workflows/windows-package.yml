name: Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ORT_PREFER_DYNAMIC_LINK: "1"
  ORT_SKIP_DOWNLOAD: "1"
  WINDOWS_DIST_DIR: dist/windows

jobs:
  package-windows:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo files
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
          key: windows-cargo-${{ hashFiles('Cargo.lock', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - name: Validate package files
        shell: pwsh
        run: |
          $distDir = Join-Path "$env:GITHUB_WORKSPACE" "$env:WINDOWS_DIST_DIR"

          if (-not (Test-Path -LiteralPath $distDir)) {
            Write-Host "Expected package directory was not created: $distDir"
            Write-Host "Bundle outputs found under target directories:"
            Get-ChildItem -Path "target", "src-tauri/target" -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "\\bundle\\" } |
              Select-Object FullName, Length |
              Format-Table -AutoSize
            throw "Expected package directory was not created: $distDir"
          }

          $files = Get-ChildItem -LiteralPath $distDir -File
          $files | Format-Table -AutoSize

          if (-not ($files | Where-Object { $_.Extension -ieq ".exe" })) {
            throw "No .exe installer found in $distDir"
          }

          if (-not (Test-Path -LiteralPath (Join-Path $distDir "SHA256SUMS.txt"))) {
            throw "Missing SHA256SUMS.txt in $distDir"
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuteBack-Windows
          path: ${{ env.WINDOWS_DIST_DIR }}
          if-no-files-found: error

      - name: Publish draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ env.WINDOWS_DIST_DIR }}/*.exe
            ${{ env.WINDOWS_DIST_DIR }}/SHA256SUMS.txt
