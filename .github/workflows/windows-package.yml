name: Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ORT_PREFER_DYNAMIC_LINK: "1"
  ORT_SKIP_DOWNLOAD: "1"

jobs:
  package-windows:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      # Repository setup
      - name: Checkout repository
        uses: actions/checkout@v4

      # Rust toolchain setup
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Dependency caching for faster builds
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
          key: windows-cargo-${{ hashFiles('Cargo.lock', 'src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      # Download and configure native assets (models, ONNX runtime)
      - name: Download native assets
        shell: pwsh
        run: ./scripts/download-assets.ps1

      # Set up environment variables for build
      - name: Configure build environment
        shell: pwsh
        run: |
          . ./scripts/common.ps1
          Set-MuteBackNativeEnv
          
          # Export environment variables for subsequent steps
          @(
            "SILERO_MODEL_PATH=$env:SILERO_MODEL_PATH"
            "SPEAKER_MODEL_PATH=$env:SPEAKER_MODEL_PATH"
            "ORT_LIB_LOCATION=$env:ORT_LIB_LOCATION"
            "ORT_DYLIB_PATH=$env:ORT_DYLIB_PATH"
            "ORT_PREFER_DYNAMIC_LINK=$env:ORT_PREFER_DYNAMIC_LINK"
            "ORT_SKIP_DOWNLOAD=$env:ORT_SKIP_DOWNLOAD"
          ) | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          
          Get-OnnxRuntimeLibDir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # Clean up old bundles to ensure fresh build
      - name: Clean previous build artifacts
        shell: pwsh
        run: |
          Remove-Item -LiteralPath "target/release/bundle" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath "src-tauri/target/release/bundle" -Recurse -Force -ErrorAction SilentlyContinue

      # Build and release based on trigger type
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --bundles nsis
          retryAttempts: 2
          uploadWorkflowArtifacts: ${{ !startsWith(github.ref, 'refs/tags/') }}
          workflowArtifactNamePattern: MuteBack-Windows-[bundle]
          uploadUpdaterJson: false
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('MuteBack {0}', github.ref_name) || '' }}
          releaseBody: ${{ startsWith(github.ref, 'refs/tags/') && 'See the assets to download and install this Windows build.' || '' }}
          releaseDraft: ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-') || false }}
