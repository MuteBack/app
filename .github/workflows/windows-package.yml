name: Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ORT_PREFER_DYNAMIC_LINK: "1"
  ORT_SKIP_DOWNLOAD: "1"
  WINDOWS_DIST_DIR: dist/windows

jobs:
  package-windows:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo files
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
          key: windows-cargo-${{ hashFiles('Cargo.lock', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install NSIS
        shell: pwsh
        run: ./scripts/install-nsis.ps1

      - name: Build NSIS installer
        id: package
        shell: pwsh
        run: |
          $distDir = [System.IO.Path]::GetFullPath((Join-Path "$env:GITHUB_WORKSPACE" "$env:WINDOWS_DIST_DIR"))
          ./scripts/package-windows.ps1 -DistDir $distDir
          ./scripts/stage-windows-package.ps1 -DistDir $distDir
          $distDirForActions = $distDir.Replace("\", "/")
          "dist-dir=$distDirForActions" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "WINDOWS_DIST_DIR_ABS=$distDirForActions" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify staged package
        shell: pwsh
        run: |
          $distDir = "${{ steps.package.outputs.dist-dir }}"
          Write-Host "GITHUB_WORKSPACE=$env:GITHUB_WORKSPACE"
          Write-Host "WINDOWS_DIST_DIR=$env:WINDOWS_DIST_DIR"
          Write-Host "WINDOWS_DIST_DIR_ABS=$env:WINDOWS_DIST_DIR_ABS"
          Write-Host "Verifying package directory: $distDir"

          if (-not (Test-Path -LiteralPath $distDir -PathType Container)) {
            throw "Expected package directory was not created: $distDir"
          }

          $files = @(Get-ChildItem -LiteralPath $distDir -File)
          $files | Format-Table -AutoSize

          if (-not ($files | Where-Object { $_.Extension -ieq ".exe" })) {
            throw "No .exe installer found in $distDir"
          }

          if (-not (Test-Path -LiteralPath (Join-Path $distDir "SHA256SUMS.txt") -PathType Leaf)) {
            throw "Missing SHA256SUMS.txt in $distDir"
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuteBack-Windows
          path: ${{ steps.package.outputs.dist-dir }}/*
          if-no-files-found: error

      - name: Publish draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ steps.package.outputs.dist-dir }}/*.exe
            ${{ steps.package.outputs.dist-dir }}/SHA256SUMS.txt
