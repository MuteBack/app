name: Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ORT_PREFER_DYNAMIC_LINK: "1"
  ORT_SKIP_DOWNLOAD: "1"

jobs:
  package-windows:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo files
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
          key: windows-cargo-${{ hashFiles('Cargo.lock', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Download native assets
        shell: pwsh
        run: ./scripts/download-assets.ps1

      - name: Configure ONNX Runtime paths
        shell: pwsh
        run: |
          $ortLib = Join-Path $env:GITHUB_WORKSPACE 'assets\vendor\onnxruntime-win-x64-1.24.2\onnxruntime-win-x64-1.24.2\lib'
          "ORT_LIB_LOCATION=$ortLib" >> $env:GITHUB_ENV
          "ORT_DYLIB_PATH=$(Join-Path $ortLib 'onnxruntime.dll')" >> $env:GITHUB_ENV
          "SILERO_MODEL_PATH=$(Join-Path $env:GITHUB_WORKSPACE 'assets\vendor\silero_vad.onnx')" >> $env:GITHUB_ENV
          "SPEAKER_MODEL_PATH=$(Join-Path $env:GITHUB_WORKSPACE 'assets\vendor\voxceleb_ECAPA512_LM.onnx')" >> $env:GITHUB_ENV
          $ortLib >> $env:GITHUB_PATH

      - name: Install Tauri CLI
        shell: pwsh
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build NSIS installer
        shell: pwsh
        run: cargo tauri build --bundles nsis

      - name: Create checksums
        shell: pwsh
        run: |
          $bundleDir = 'src-tauri\target\release\bundle\nsis'
          Get-ChildItem $bundleDir -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content -Path (Join-Path $bundleDir 'SHA256SUMS.txt') -Encoding ascii

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuteBack-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/SHA256SUMS.txt
